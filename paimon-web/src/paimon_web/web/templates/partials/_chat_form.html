<form id="chat-form" onsubmit="sendMessage(event, '{{ env_id }}')" class="chat-form-dropzone">
    <div class="chat-input-row">
        <label class="file-icon-button" title="Attach files">
            <span class="icon">+</span>
            <input type="file" id="chat-files" multiple
                   onchange="updateChatFileLabel(this)">
        </label>

        <div class="message-input-wrapper">
            <textarea
                id="message-input"
                placeholder="Type your message..."
                rows="1"
                autofocus
                required
            ></textarea>
            <span class="file-names-inline" id="chat-file-names"></span>
        </div>

        <button type="submit" id="send-button" class="btn-icon-send" title="Send message">
            <span class="send-icon">></span>
        </button>
    </div>
</form>
<div class="drop-zone-overlay" id="drop-zone-overlay">
    <div class="drop-zone-text">Drop files here to upload</div>
</div>
